services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: ovgs
      POSTGRES_PASSWORD: ovgs
      POSTGRES_DB: ovgs
    ports:
      - "5432:5432"
    volumes:
      - ovgs_postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ovgs"]
      interval: 5s
      timeout: 5s
      retries: 10

  backend:
    build:
      context: ./backend
    environment:
      DATABASE_URL: postgresql://ovgs:ovgs@db:5432/ovgs?schema=public
      PORT: 3333
    ports:
      - "3333:3333"
    depends_on:
      db:
        condition: service_healthy

  frontend:
    build:
      context: ./frontend
      args:
        NEXT_PUBLIC_API_URL: http://localhost:3333
    ports:
      - "3000:3000"
    depends_on:
      - backend

volumes:
  ovgs_postgres_data:
